services:
  db:
    image: mysql:latest
    container_name: mysql-timesheet
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: timesheet
    volumes:
      - timesheetvol:/var/lib/mysql
    ports:
      - "3306:3306"

  app:
    image: timesheet-ahmedkhlifi-4nids2
    container_name: timesheet-app
    depends_on:
      - db
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/timesheet?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpass
    ports:
      - "8081:8080"

volumes:
  timesheetvol:
